        <section class="contact-section">
        <div class="contact-card">
            <h2>Vamos criar algo juntos?</h2>
            <p>Se tens um projeto em mente ou apenas queres dizer olá, envia uma mensagem.</p>
             <a href="https://linktr.ee/Patidb" target="_blank" class="contact-link-text">@pdb</a>
            
                <form id="my-form" class="contact-form" action="https://formspree.io/f/xpqkngol" method="POST">
        <input type="text" name="name" placeholder="Nome" required>
        <input type="email" name="_replyto" placeholder="E-mail" required>
        <textarea name="message" placeholder="Como posso ajudar?" rows="5" required></textarea>
        <button id="my-form-button" type="submit">Enviar</button>
        
        <p id="my-form-status"></p>
    </form>
        </div>
    </section>

    <script src="script.js"></script>
    <script>
  var form = document.getElementById("my-form");
  
  async function handleSubmit(event) {
    event.preventDefault(); // Impede a página de recarregar ou mudar
    var status = document.getElementById("my-form-status");
    var data = new FormData(event.target);
    
    fetch(event.target.action, {
      method: form.method,
      body: data,
      headers: {
          'Accept': 'application/json'
      }
    }).then(response => {
      if (response.ok) {
        status.innerHTML = "Mensagem enviada com sucesso!";
        status.style.color = "green";
        form.reset(); // Limpa o formulário para a pessoa ver que foi enviado
      } else {
        response.json().then(data => {
          if (Object.hasOwn(data, 'errors')) {
            status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
          } else {
            status.innerHTML = "Ups! Houve um problema ao enviar.";
          }
        })
      }
    }).catch(error => {
      status.innerHTML = "Ups! Houve um problema ao enviar.";
    });
  }
  
  form.addEventListener("submit", handleSubmit)
</script>
</body>
</html>
